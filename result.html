<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4 text-center">
        <h2>Resume Analysis Result</h2>
        <h3 id="score" class="text-success mt-3"></h3>
        <p id="feedback" class="mt-3"></p>

        <a href="index.html" class="btn btn-primary mt-3">Analyze Another</a>
    </div>
</div>

<script>
    const data = JSON.parse(localStorage.getItem("result"));

    if (data && data.score !== undefined) {
        document.getElementById("score").innerText = "ATS Score: " + data.score + "%";
        document.getElementById("feedback").innerText = data.feedback || "Analysis Complete";
    } else {
        document.getElementById("score").innerText = "Error calculating score";
        document.getElementById("feedback").innerText = "Please try again.";
    }
</script>
</body>
</html>
